server:
  port: 8072
  servlet:
    context-path: /

spring:
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  application:
    name: creditpass

  datasource:
    url: jdbc:postgresql://localhost:5432/creditpass
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  Jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-flex:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    print-banner: false

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  is-read-header: true
  is-read-cookie: false

creditpass:
  api-crypto-key: ${API_CRYPTO_KEY:creditpass-api-envelope-key}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:creditpass}
    region: ${MINIO_REGION:cn-beijing-1}
    secure: ${MINIO_SECURE:false}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  mail:
    provider: aliyun
    api-key: ${ALIYUN_MAIL_API_KEY:}
    secret-key: ${ALIYUN_MAIL_SECRET_KEY:}
    sender-email: ${ALIYUN_MAIL_SENDER_EMAIL:aitest@mail.pantoria.cn}
    region-id: ${ALIYUN_MAIL_REGION_ID:cn-hangzhou}
    account-name: ${ALIYUN_MAIL_SENDER_EMAIL:aitest@mail.pantoria.cn}
    from-alias: CreditPass

logging:
  level:
    com.creditpass: INFO
    com.mybatisflex: WARN
